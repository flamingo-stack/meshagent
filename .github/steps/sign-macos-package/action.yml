name: Sign MacOS package
description: Sign built universal MacOS package and Notarize it
inputs:
  apple_certificate_p12:
    description: 'Base64 encoded Apple Developer certificate (.p12)'
    required: true
  apple_certificate_password:
    description: 'Password for the .p12 certificate'
    required: true
  apple_developer_id:
    description: 'Apple Developer ID string'
    required: true
  apple_id_username:
    description: 'Apple ID username for notarization'
    required: true
  apple_id_password:
    description: 'App-specific password for Apple ID'
    required: true
  apple_team_id:
    description: 'Apple Developer ID'
    required: true
  binary_name:
    description: 'Name of built MacOS binary (e.g. "rmmagent")'
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup and export all needed vars
      shell: bash
      run: |
        BINARY_NAME="${{ inputs.binary_name }}"
        BINARY_PATH="./artifacts/$BINARY_NAME"
        APP_BUNDLE_PATH="./artifacts/MeshAgent.app"
        DEVELOPER_ID="${{ inputs.apple_developer_id }}"

        echo "BINARY_NAME=$BINARY_NAME"  >> $GITHUB_ENV
        echo "BINARY_PATH=$BINARY_PATH" >> $GITHUB_ENV
        echo "APP_BUNDLE_PATH=$APP_BUNDLE_PATH" >> $GITHUB_ENV
        echo "DEVELOPER_ID=$DEVELOPER_ID" >> $GITHUB_ENV

    - name: Setup Apple Code Signing
      shell: bash
      run: |
        CERTIFICATE_PATH="$HOME/certificate.p12"
        KEYCHAIN_PATH="$HOME/signing.keychain-db"
        
        # Decode certificate and create keychain
        echo "${{ inputs.apple_certificate_p12 }}" | base64 --decode > "$CERTIFICATE_PATH"
        security create-keychain -p "${{ inputs.apple_certificate_password }}" "$KEYCHAIN_PATH"
        security default-keychain -s "$KEYCHAIN_PATH"
        security unlock-keychain -p "${{ inputs.apple_certificate_password }}" "$KEYCHAIN_PATH"
        
        # Import certificate and set key partition list
        security import "$CERTIFICATE_PATH" -P "${{ inputs.apple_certificate_password }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -s -k "${{ inputs.apple_certificate_password }}" "$KEYCHAIN_PATH"
                
        # Verify setup, cleanup initial cert and export path
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"
        rm "$CERTIFICATE_PATH"
        echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

        # Extract the signing identity from the keychain (use SHA-1 hash for reliability)
        SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
        if [[ -z "$SIGNING_IDENTITY" ]]; then
          echo "Error: No Developer ID Application identity found in keychain"
          exit 1
        fi
        echo "Found signing identity: $SIGNING_IDENTITY"
        echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> $GITHUB_ENV

    - name: Code Sign Application Bundle
      shell: bash
      run: |
        chmod +x "$APP_BUNDLE_PATH/Contents/MacOS/$BINARY_NAME"

        # Sign the .app bundle with --deep --force
        codesign --sign "$SIGNING_IDENTITY" --timestamp --options runtime --deep --force "$APP_BUNDLE_PATH"

        # Verify signature
        codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE_PATH"
        codesign -dv --verbose=4 "$APP_BUNDLE_PATH"
        echo "Application bundle signed successfully"

    - name: Create archive and submit for Notarization
      shell: bash
      run: |
        # Create zip archive of the .app bundle for notarization
        ditto -c -k --keepParent "$APP_BUNDLE_PATH" "MeshAgent.zip"

        echo "Submitting application bundle for notarization..."
        xcrun notarytool submit "MeshAgent.zip" \
          --apple-id "${{ inputs.apple_id_username }}" \
          --password "${{ inputs.apple_id_password }}" \
          --team-id "${{ inputs.apple_team_id }}" \
          --wait \
          --timeout 30m

        # Staple the notarization ticket to the app bundle
        xcrun stapler staple "$APP_BUNDLE_PATH"

        # Cleanup zip
        rm "MeshAgent.zip"
        echo "Notarization completed and stapled successfully"          

    - name: Verify Final Application Bundle
      shell: bash
      run: |
        # Verify code signature and notarization
        codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE_PATH"
        spctl --assess --type execute --verbose "$APP_BUNDLE_PATH" || true
        echo "Application bundle is signed, notarized, and ready for distribution"

    - name: Cleanup Keychain
      if: always()
      shell: bash
      run: |
        if [[ -n "$KEYCHAIN_PATH" ]] && [[ -f "$KEYCHAIN_PATH" ]]; then
          security delete-keychain "$KEYCHAIN_PATH"
        fi
