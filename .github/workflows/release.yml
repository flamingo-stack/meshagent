name: MeshAgent Release

permissions:
  contents: write
  packages: write
  actions: write
  pull-requests: write
  attestations: write
  id-token: write

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to Release (e.g., v1.2.3)"
        required: true
        type: string

env:
  REGISTRY: "ghcr.io"
  ORGANISATION: ${{ github.repository_owner }}
  REPOSITORY: ${{ github.event.repository.name }}
  BINARY_NAME: meshagent

# =============================================================================
# JOBS
# =============================================================================

jobs:
  build_client:
    name: "Build C Client (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    if: |
      github.event_name == 'push' || 
      github.event_name == 'workflow_dispatch'
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "macOS x86-64"
            os: macos-15-intel
            os_arch: x86-64
            archid: 16
            artifact_name: meshagent_osx-x86-64
          - name: "macOS ARM64"
            os: macos-latest
            os_arch: arm64
            archid: 29
            artifact_name: meshagent_osx-arm-64
          - name: "Windows x64"
            os: windows-latest
            os_arch: x64
            archid: 4
            artifact_name: meshagent-windows-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2
      
      - name: Setup Visual Studio Build Tools
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.os_arch }}      

      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: brew install openssl jpeg zlib
        shell: bash
      
      - name: Build MeshAgent for Windows ${{ matrix.os_arch }} with MSBuild
        if: matrix.os == 'windows-latest'
        run: msbuild MeshAgent-2022.sln -p:Configuration=Release -p:Platform=${{ matrix.os_arch }} -p:WindowsTargetPlatformVersion=10.0.26100.0
        shell: cmd

      - name: Build MeshAgent for macOS ${{ matrix.os_arch }}
        if: runner.os == 'macOS'
        run: make macos ARCHID=${{ matrix.archid }}

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p artifacts

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "Release/MeshService64.exe" "artifacts/${{ env.BINARY_NAME }}.exe"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            if [[ "${{ matrix.os_arch }}" == "arm64" ]]; then
              cp "build/output/meshagent_osx-arm-64" "artifacts/${{ env.BINARY_NAME }}"
            else
              cp "build/output/meshagent_osx-x86-64" "artifacts/${{ env.BINARY_NAME }}"
            fi
          fi          

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            artifacts/
          if-no-files-found: warn
          retention-days: 30
          compression-level: 9


  create_universal_macos:
    name: "Create Universal macOS Binary"
    needs: [build_client]
    runs-on: macos-latest
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      !failure() && !cancelled()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download macOS x86-64 Binary
        uses: actions/download-artifact@v4
        with:
          name: meshagent_osx-x86-64
          path: x64-artifacts/

      - name: Download macOS ARM64 Binary
        uses: actions/download-artifact@v4
        with:
          name: meshagent_osx-arm-64
          path: arm64-artifacts/

      - name: Create Universal Binary
        run: |
          mkdir -p artifacts
          lipo -create "x64-artifacts/${{ env.BINARY_NAME }}" "arm64-artifacts/${{ env.BINARY_NAME }}" \
            -output ./artifacts/${{ env.BINARY_NAME }}
          lipo -info ./artifacts/${{ env.BINARY_NAME }}

      - name: Create Application Bundle
        run: |
          BUILD_TIME=$(date +%y.%m.%d.%H.%M.%S)
          BUILD_DATE=$(echo $BUILD_TIME | cut -d. -f1-3)
          BUILD_TIME_ONLY=$(echo $BUILD_TIME | cut -d. -f4-6)
          ./build/tools/macos_build/create-app-bundle.sh \
            ./artifacts/${{ env.BINARY_NAME }} \
            ./artifacts/MeshAgent.app \
            meshagent \
            $BUILD_DATE \
            $BUILD_TIME_ONLY

      - name: Sign MacOS package
        uses: ./.github/steps/sign-macos-package
        with:
          apple_certificate_p12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          apple_certificate_password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          apple_developer_id: ${{ secrets.APPLE_DEVELOPER_ID }}
          apple_id_username: ${{ secrets.APPLE_ID_USERNAME }}
          apple_id_password: ${{ secrets.APPLE_ID_PASSWORD }}
          apple_team_id: ${{ secrets.APPLE_TEAM_ID }}
          binary_name: ${{ env.BINARY_NAME }}

      - name: Upload Universal App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: meshagent-mac-universal
          path: artifacts/MeshAgent.app/
          include-hidden-files: true
          retention-days: 30
          compression-level: 9
  

  release:
    name: "Create Release"
    needs: [build_client, create_universal_macos]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && 
      inputs.version != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release artifacts
        run: |
          set -e
          mkdir -p final-artifacts/clients

          # macOS - reconstruct .app bundle and archive
          if [ -d "release-artifacts/meshagent-mac-universal/Contents" ]; then
            mkdir -p release-artifacts/meshagent-mac-universal-app
            mv release-artifacts/meshagent-mac-universal release-artifacts/meshagent-mac-universal-app/MeshAgent.app
            tar -czvf "final-artifacts/clients/meshagent-macos-universal.tar.gz" \
              -C "release-artifacts/meshagent-mac-universal-app" MeshAgent.app
          fi

          # Windows
          if [ -d "release-artifacts/meshagent-windows-amd64" ]; then
            (cd "release-artifacts/meshagent-windows-amd64" && \
              zip "${GITHUB_WORKSPACE}/final-artifacts/clients/meshagent-windows-amd64.zip" ${{ env.BINARY_NAME }}.exe)
          fi

          # Verify all expected artifacts exist
          MISSING=""
          [ ! -f "final-artifacts/clients/meshagent-macos-universal.tar.gz" ] && MISSING="$MISSING macOS"
          [ ! -f "final-artifacts/clients/meshagent-windows-amd64.zip" ] && MISSING="$MISSING Windows"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing release artifacts:$MISSING"
            exit 1
          fi

      - name: Generate release header
        run: |
          cat > RELEASE_HEADER.md <<EOF
          ## MeshAgent Clients
          - **macOS** (Universal App Bundle): \`meshagent-macos-universal.tar.gz\` - Extract and run MeshAgent.app
          - **Windows** (amd64): \`meshagent-windows-amd64.zip\`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "🦩 ${{ inputs.version }}"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: RELEASE_HEADER.md
          files: |
            final-artifacts/clients/*
