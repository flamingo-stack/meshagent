name: Build OpenSSL Linux

on:
  workflow_dispatch:
    inputs:
      openssl_version:
        description: 'OpenSSL version to build'
        required: false
        default: '3.5.4'

jobs:
  build-linux:
    strategy:
      matrix:
        arch:
          # x86-64 build (glibc)
          - { name: 'x86-64', platform: 'linux/amd64', image: 'debian:bullseye', openssl: 'linux-x86_64', archname: 'x86-64' }

          # x86-64 build (musl) - Alpine Linux
          - { name: 'alpine-x86-64', platform: 'linux/amd64', image: 'alpine:latest', openssl: 'linux-x86_64', archname: 'alpine-x86-64', alpine: true }

          # x86-64 build (musl) - OpenWrt
          - { name: 'openwrt-x86-64', platform: 'linux/amd64', image: 'alpine:latest', openssl: 'linux-x86_64', archname: 'openwrt_x86_64', alpine: true }

          # x86 build (glibc, multilib)
          - { name: 'x86', platform: 'linux/amd64', image: 'debian:bullseye', openssl: 'linux-x86', archname: 'x86', multilib: true }

          # ARM64 build (glibc, cross-compiled)
          - { name: 'arm64', platform: 'linux/amd64', image: 'debian:bullseye', openssl: 'linux-aarch64', archname: 'arm64', cross_compile: true }

          # ARM64 build (glibc 2.24, cross-compiled) - ARCHID 32
          - { name: 'aarch64', platform: 'linux/amd64', image: 'debian:bullseye', openssl: 'linux-aarch64', archname: 'aarch64', cross_compile: true }

          # ARMhf build (glibc, cross-compiled)
          - { name: 'armhf', platform: 'linux/amd64', image: 'debian:bullseye', openssl: 'linux-armv4', archname: 'armhf', cross_compile: true }

          # MIPS build (glibc, cross-compiled)
          - { name: 'mips24kc', platform: 'linux/amd64', image: 'debian:bullseye', openssl: 'linux-mips32', archname: 'mips24kc', cross_compile: true }

          # MIPSEL 24Kc build (glibc, cross-compiled) - OpenWrt routers little-endian
          - { name: 'mipsel24kc', platform: 'linux/amd64', image: 'debian:bullseye', openssl: 'linux-mips32', archname: 'mipsel24kc', cross_compile: true }

          # ARM64 Cortex-A53 build (glibc, cross-compiled) - OpenWrt ARM64 routers
          - { name: 'aarch64-cortex-a53', platform: 'linux/amd64', image: 'debian:bullseye', openssl: 'linux-aarch64', archname: 'aarch64-cortex-a53', cross_compile: true }

          # RISC-V 64-bit build (glibc, cross-compiled)
          - { name: 'riscv64', platform: 'linux/amd64', image: 'debian:bullseye', openssl: 'linux64-riscv64', archname: 'riscv64', cross_compile: true }
      fail-fast: false

    runs-on: ubuntu-latest

    name: Build ${{ matrix.arch.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Download OpenSSL source
        run: |
          VERSION="${{ github.event.inputs.openssl_version || '3.5.4' }}"
          BUILD_DIR="openssl-build-linux-${{ matrix.arch.name }}"
          curl -L "https://github.com/openssl/openssl/releases/download/openssl-$VERSION/openssl-$VERSION.tar.gz" -o openssl.tar.gz
          mkdir -p "$BUILD_DIR"
          tar -xzf openssl.tar.gz -C "$BUILD_DIR" --strip-components=1
          rm openssl.tar.gz

      - name: Build OpenSSL in Docker (x86-64 native glibc)
        if: ${{ !matrix.arch.cross_compile && !matrix.arch.alpine && !matrix.arch.multilib }}
        run: |
          docker run --rm --platform=${{ matrix.arch.platform }} \
            -v "$PWD/openssl-build-linux-${{ matrix.arch.name }}:/build" \
            -v "$PWD/openssl-output:/output" \
            -w /build \
            ${{ matrix.arch.image }} \
            bash -c "apt-get update -qq && \
                     apt-get install -y -qq build-essential perl > /dev/null 2>&1 && \
                     ./Configure ${{ matrix.arch.openssl }} \
                       no-weak-ssl-ciphers no-srp no-psk no-comp no-zlib no-zlib-dynamic \
                       no-threads no-dso no-shared no-asm no-rc5 no-idea \
                       no-md4 no-rmd160 no-ssl no-ssl3 no-seed no-camellia no-bf no-cast \
                       no-md2 no-mdc2 \
                       --release && \
                     make -j\$(nproc) build_libs && \
                     mkdir -p /output/${{ matrix.arch.archname }} && \
                     cp libssl.a libcrypto.a /output/${{ matrix.arch.archname }}/ && \
                     echo 'Build complete for ${{ matrix.arch.name }}'"

      - name: Build OpenSSL in Docker (x86 multilib)
        if: ${{ matrix.arch.multilib }}
        run: |
          docker run --rm --platform=${{ matrix.arch.platform }} \
            -v "$PWD/openssl-build-linux-${{ matrix.arch.name }}:/build" \
            -v "$PWD/openssl-output:/output" \
            -w /build \
            ${{ matrix.arch.image }} \
            bash -c "apt-get update -qq && \
                     apt-get install -y -qq build-essential gcc-multilib g++-multilib perl > /dev/null 2>&1 && \
                     ./Configure ${{ matrix.arch.openssl }} \
                       no-weak-ssl-ciphers no-srp no-psk no-comp no-zlib no-zlib-dynamic \
                       no-threads no-dso no-shared no-asm no-rc5 no-idea \
                       no-md4 no-rmd160 no-ssl no-ssl3 no-seed no-camellia no-bf no-cast \
                       no-md2 no-mdc2 \
                       -m32 \
                       --release && \
                     make -j\$(nproc) build_libs && \
                     mkdir -p /output/${{ matrix.arch.archname }} && \
                     cp libssl.a libcrypto.a /output/${{ matrix.arch.archname }}/ && \
                     echo 'Build complete for ${{ matrix.arch.name }}'"

      - name: Build OpenSSL in Docker (Alpine/musl)
        if: ${{ matrix.arch.alpine }}
        run: |
          docker run --rm --platform=${{ matrix.arch.platform }} \
            -v "$PWD/openssl-build-linux-${{ matrix.arch.name }}:/build" \
            -v "$PWD/openssl-output:/output" \
            -w /build \
            ${{ matrix.arch.image }} \
            sh -c "apk add --no-cache build-base perl linux-headers > /dev/null 2>&1 && \
                   ./Configure ${{ matrix.arch.openssl }} \
                     no-weak-ssl-ciphers no-srp no-psk no-comp no-zlib no-zlib-dynamic \
                     no-threads no-dso no-shared no-asm no-rc5 no-idea \
                     no-md4 no-rmd160 no-ssl no-ssl3 no-seed no-camellia no-bf no-cast \
                     no-md2 no-mdc2 \
                     --release && \
                   make -j\$(nproc) build_libs && \
                   mkdir -p /output/${{ matrix.arch.archname }} && \
                   cp libssl.a libcrypto.a /output/${{ matrix.arch.archname }}/ && \
                   echo 'Build complete for ${{ matrix.arch.name }}'"

      - name: Build OpenSSL in Docker (cross-compile)
        if: ${{ matrix.arch.cross_compile }}
        run: |
          # Determine cross-compile prefix and package based on architecture
          case "${{ matrix.arch.name }}" in
            mips24kc)
              CROSS_PREFIX="mips-linux-gnu-"
              GCC_PACKAGE="gcc-10-mips-linux-gnu g++-10-mips-linux-gnu"
              NEED_VERSION_SYMLINKS=true
              ;;
            mipsel24kc)
              CROSS_PREFIX="mipsel-linux-gnu-"
              GCC_PACKAGE="gcc-10-mipsel-linux-gnu g++-10-mipsel-linux-gnu"
              NEED_VERSION_SYMLINKS=true
              ;;
            arm64)
              CROSS_PREFIX="aarch64-linux-gnu-"
              GCC_PACKAGE="gcc-aarch64-linux-gnu g++-aarch64-linux-gnu"
              NEED_VERSION_SYMLINKS=false
              ;;
            aarch64)
              CROSS_PREFIX="aarch64-linux-gnu-"
              GCC_PACKAGE="gcc-aarch64-linux-gnu g++-aarch64-linux-gnu"
              NEED_VERSION_SYMLINKS=false
              ;;
            armhf)
              CROSS_PREFIX="arm-linux-gnueabihf-"
              GCC_PACKAGE="gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf"
              NEED_VERSION_SYMLINKS=false
              ;;
            aarch64-cortex-a53)
              CROSS_PREFIX="aarch64-linux-gnu-"
              GCC_PACKAGE="gcc-aarch64-linux-gnu g++-aarch64-linux-gnu"
              NEED_VERSION_SYMLINKS=false
              ;;
            riscv64)
              CROSS_PREFIX="riscv64-linux-gnu-"
              GCC_PACKAGE="gcc-riscv64-linux-gnu g++-riscv64-linux-gnu"
              NEED_VERSION_SYMLINKS=false
              ;;
            *)
              echo "Unknown architecture: ${{ matrix.arch.name }}"
              exit 1
              ;;
          esac

          # Build the symlink commands for versioned packages (MIPS only)
          if [ "$NEED_VERSION_SYMLINKS" = "true" ]; then
            SYMLINK_COMMANDS="ln -s /usr/bin/${CROSS_PREFIX}gcc-10 /usr/bin/${CROSS_PREFIX}gcc && \
                             ln -s /usr/bin/${CROSS_PREFIX}g++-10 /usr/bin/${CROSS_PREFIX}g++ && \
                             ln -s /usr/bin/${CROSS_PREFIX}ar-10 /usr/bin/${CROSS_PREFIX}ar || true && \
                             ln -s /usr/bin/${CROSS_PREFIX}ranlib-10 /usr/bin/${CROSS_PREFIX}ranlib || true && "
          else
            SYMLINK_COMMANDS=""
          fi

          docker run --rm --platform=${{ matrix.arch.platform }} \
            -v "$PWD/openssl-build-linux-${{ matrix.arch.name }}:/build" \
            -v "$PWD/openssl-output:/output" \
            -w /build \
            ${{ matrix.arch.image }} \
            bash -c "apt-get update -qq && \
                     apt-get install -y -qq build-essential $GCC_PACKAGE perl file > /dev/null 2>&1 && \
                     ${SYMLINK_COMMANDS} \
                     ./Configure ${{ matrix.arch.openssl }} \
                       no-weak-ssl-ciphers no-srp no-psk no-comp no-zlib no-zlib-dynamic \
                       no-threads no-dso no-shared no-asm no-rc5 no-idea \
                       no-md4 no-rmd160 no-ssl no-ssl3 no-seed no-camellia no-bf no-cast \
                       no-md2 no-mdc2 \
                       --cross-compile-prefix=${CROSS_PREFIX} \
                       --release && \
                     make -j\$(nproc) build_libs && \
                     mkdir -p /output/${{ matrix.arch.archname }} && \
                     cp libssl.a libcrypto.a /output/${{ matrix.arch.archname }}/ && \
                     echo 'Build complete for ${{ matrix.arch.name }}'"

      - name: Verify build
        run: |
          ls -lh openssl-output/${{ matrix.arch.archname }}/
          file openssl-output/${{ matrix.arch.archname }}/*.a || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openssl-linux-${{ matrix.arch.name }}
          path: openssl-output/${{ matrix.arch.archname }}/*.a
          retention-days: 30

  combine-artifacts:
    needs: build-linux
    runs-on: ubuntu-latest
    name: Combine all Linux builds

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Combine into single structure
        run: |
          mkdir -p openssl-linux-libs/x86-64
          mkdir -p openssl-linux-libs/alpine-x86-64
          mkdir -p openssl-linux-libs/openwrt_x86_64
          mkdir -p openssl-linux-libs/x86
          mkdir -p openssl-linux-libs/arm64
          mkdir -p openssl-linux-libs/aarch64
          mkdir -p openssl-linux-libs/armhf
          mkdir -p openssl-linux-libs/mips24kc
          mkdir -p openssl-linux-libs/mipsel24kc
          mkdir -p openssl-linux-libs/aarch64-cortex-a53
          mkdir -p openssl-linux-libs/riscv64

          # Copy all libraries to their respective architecture folders
          cp artifacts/openssl-linux-x86-64/*.a openssl-linux-libs/x86-64/ || true
          cp artifacts/openssl-linux-alpine-x86-64/*.a openssl-linux-libs/alpine-x86-64/ || true
          cp artifacts/openssl-linux-openwrt-x86-64/*.a openssl-linux-libs/openwrt_x86_64/ || true
          cp artifacts/openssl-linux-x86/*.a openssl-linux-libs/x86/ || true
          cp artifacts/openssl-linux-arm64/*.a openssl-linux-libs/arm64/ || true
          cp artifacts/openssl-linux-aarch64/*.a openssl-linux-libs/aarch64/ || true
          cp artifacts/openssl-linux-armhf/*.a openssl-linux-libs/armhf/ || true
          cp artifacts/openssl-linux-mips24kc/*.a openssl-linux-libs/mips24kc/ || true
          cp artifacts/openssl-linux-mipsel24kc/*.a openssl-linux-libs/mipsel24kc/ || true
          cp artifacts/openssl-linux-aarch64-cortex-a53/*.a openssl-linux-libs/aarch64-cortex-a53/ || true
          cp artifacts/openssl-linux-riscv64/*.a openssl-linux-libs/riscv64/ || true

          # Display results
          echo "=== Build Results ==="
          find openssl-linux-libs -type f -exec ls -lh {} \;

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: openssl-3.5.4-linux-all
          path: openssl-linux-libs/
          retention-days: 90

      - name: Create build report
        run: |
          cat > BUILD_REPORT.md << 'EOF'
          # OpenSSL 3.5.4 Linux Build Report

          ## Build Date
          $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Architectures Built
          - **x86-64** (64-bit Intel/AMD with glibc)
          - **alpine-x86-64** (64-bit Intel/AMD with musl libc - Alpine Linux)
          - **openwrt_x86_64** (64-bit Intel/AMD with musl libc - OpenWrt)
          - **x86** (32-bit Intel/AMD with glibc)
          - **ARM64** (64-bit ARM with glibc)
          - **aarch64** (64-bit ARM with glibc 2.24, cross-compiled - ARCHID 32)
          - **ARMhf** (32-bit ARM hard-float with glibc)
          - **MIPS24Kc** (MIPS 24Kc big-endian with glibc, cross-compiled)
          - **MIPSEL24Kc** (MIPS 24Kc little-endian with glibc, cross-compiled - OpenWrt)
          - **aarch64-cortex-a53** (ARM64 Cortex-A53 with glibc - OpenWrt)
          - **riscv64** (RISC-V 64-bit with glibc)

          ## Libraries Created

          ### x86-64 (glibc)
          $(ls -lh openssl-linux-libs/x86-64/*.a 2>/dev/null || echo "No files")

          ### alpine-x86-64 (Alpine Linux)
          $(ls -lh openssl-linux-libs/alpine-x86-64/*.a 2>/dev/null || echo "No files")

          ### openwrt_x86_64 (OpenWrt)
          $(ls -lh openssl-linux-libs/openwrt_x86_64/*.a 2>/dev/null || echo "No files")

          ### x86
          $(ls -lh openssl-linux-libs/x86/*.a 2>/dev/null || echo "No files")

          ### ARM64
          $(ls -lh openssl-linux-libs/arm64/*.a 2>/dev/null || echo "No files")

          ### aarch64 (glibc 2.24 - ARCHID 32)
          $(ls -lh openssl-linux-libs/aarch64/*.a 2>/dev/null || echo "No files")

          ### ARMhf
          $(ls -lh openssl-linux-libs/armhf/*.a 2>/dev/null || echo "No files")

          ### MIPS24Kc (big-endian)
          $(ls -lh openssl-linux-libs/mips24kc/*.a 2>/dev/null || echo "No files")

          ### MIPSEL24Kc (little-endian OpenWrt)
          $(ls -lh openssl-linux-libs/mipsel24kc/*.a 2>/dev/null || echo "No files")

          ### aarch64-cortex-a53 (OpenWrt ARM64)
          $(ls -lh openssl-linux-libs/aarch64-cortex-a53/*.a 2>/dev/null || echo "No files")

          ### riscv64 (RISC-V 64-bit)
          $(ls -lh openssl-linux-libs/riscv64/*.a 2>/dev/null || echo "No files")

          ## Build Configuration
          All builds use identical OpenSSL configure options:
          ```
          no-weak-ssl-ciphers no-srp no-psk no-comp no-zlib no-zlib-dynamic
          no-threads no-dso no-shared no-asm no-rc5 no-idea
          no-md4 no-rmd160 no-ssl no-ssl3 no-seed no-camellia no-bf no-cast
          no-md2 no-mdc2
          ```

          ## Compiler
          - GCC from Debian Bullseye (glibc builds)
          - GCC from Alpine Linux (musl build)
          - Standard glibc linking (Debian builds)
          - musl libc linking (Alpine build)
          - MIPS: Cross-compiled using gcc-10-mips-linux-gnu

          ## Build Method
          - Docker with QEMU for cross-platform builds
          - Platform-specific base images for each architecture
          - Alpine Linux for musl libc build
          - MIPS: Cross-compilation on amd64 host

          ## GitHub Actions Workflow
          Built using: `.github/workflows/build-openssl-linux.yml`

          EOF

      - name: Upload build report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: BUILD_REPORT.md
          retention-days: 90
